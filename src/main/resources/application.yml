server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: just-catering-superadmin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:./data/just_catering_superadmin.db}?foreign_keys=on&journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      pool-name: JustCateringSqlitePool
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 20000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        jdbc.batch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    basename: messages
    encoding: UTF-8

# -----------------------------------------------------------------------------
# Application custom configuration
# -----------------------------------------------------------------------------
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:JustCateringSuperAdminJwtSecretKey2026MustBeAtLeast256BitsLong!!}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  security:
    max-failed-login-attempts: 5
    lock-duration-minutes: 30
  bootstrap:
    super-admin:
      enabled: true
      email: ${SUPER_ADMIN_EMAIL:admin@justcatering.com}
      password: ${SUPER_ADMIN_PASSWORD:Admin@12345}
      first-name: Super
      last-name: Admin
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size-bytes: 10485760
    allowed-image-types: image/jpeg,image/png,image/webp,image/gif
    allowed-document-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# -----------------------------------------------------------------------------
# SpringDoc / Swagger
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.justcatering.superadmin: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
